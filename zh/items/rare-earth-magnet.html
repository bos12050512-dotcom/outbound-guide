    <h1 class="text-4xl font-black mb-6">拾光旅人：稀土磁铁如何获取？</h1>
    <div class="prose prose-slate lg:prose-xl">
      <p class="text-lg mb-4">稀土磁铁是《拾光旅人 Outbound》中后期制作 3 级电机和高效发电机必不可少的材料。以下是获取路径。</p>
      <h2 class="text-2xl font-bold mt-8 mb-4">1. 采集地点：沙漠生物群系洞穴</h2>
      <p>稀土原矿主要分布在地图东南方向的<strong>沙漠生物群系</strong>深处洞穴中。寻找墙壁上发光的黑色晶体簇。</p>
      <h2 class="text-2xl font-bold mt-8 mb-4">2. 合成配方</h2>
      <ul class="list-disc pl-6 space-y-2">
        <li><strong>稀土原矿</strong> x 2</li>
        <li><strong>铜锭</strong> x 1</li>
        <li>需要 <strong>2 级精炼站</strong></li>
      </ul>
      <h2 class="text-2xl font-bold mt-8 mb-4">3. 实战小贴士</h2>
      <p>去沙漠洞穴探险时请多带 2 块电池，因为沙漠的极端气温会降低房车的远程充电效率。</p>
