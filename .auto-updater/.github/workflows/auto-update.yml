name: Outbound Guide Auto Update

on:
  schedule:
    # 每天北京时间 09:00 运行 (UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout website repo
      uses: actions/checkout@v4
      with:
        repository: bos12050512-dotcom/outbound-guide
        token: ${{ secrets.GH_PAT }}
        path: outbound-site
    
    - name: Checkout updater repo
      uses: actions/checkout@v4
      with:
        path: updater
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd updater
        pip install -r requirements.txt
    
    - name: Run auto updater
      env:
        SITE_REPO_PATH: ${{ github.workspace }}/outbound-site
      run: |
        cd updater
        python main.py
    
    - name: Commit and push changes
      run: |
        cd outbound-site
        git config user.name "Outbound Bot"
        git config user.email "bot@outboundguide.org"
        git add -A
        git diff --staged --quiet || (git commit -m "auto: daily content update $(date +%Y-%m-%d)" && git push)
